# LiteLLM routing configuration — maps model aliases to local and cloud endpoints.

model_list:
  # Alien node — Llama 3.2 3B via llama.cpp
  - model_name: alien/llama-3.2-3b
    litellm_params:
      model: openai/Llama-3.2-3B-Instruct-Q6_K.gguf
      api_base: http://192.168.1.144:8080/v1
      api_key: not-required

  # Sardinia node — Llama 3.1 8B via LM Studio (Developer Mode)
  - model_name: sardinia/llama-3.1-8b
    litellm_params:
      model: openai/meta-llama-3.1-8b-instruct
      api_base: http://192.168.1.45:1234/v1
      api_key: not-required

  # Gemini — Narrator / cloud escalation
  - model_name: gemini/gemini-2.5-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY

litellm_settings:
  drop_params: true
  request_timeout: 120
  num_retries: 2
