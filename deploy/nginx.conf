server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name your.domain.here;

    # TLS — provision with: certbot --nginx -d your.domain.here
    ssl_certificate     /etc/letsencrypt/live/your.domain.here/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your.domain.here/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Serve static files directly
    location / {
        root /opt/showrunner/src/showrunner/web/static;
        try_files $uri $uri/ @app;
    }

    # SSE and API proxy — disable buffering so events stream immediately
    location @app {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
    }

    # /play and /play/input go directly to uvicorn
    location ~ ^/play {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
    }
}
