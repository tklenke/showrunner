identity:
  name: "Z-4P0 ('Zee')"
  species: "Droid (Modified Z-series Technical)"
  career: "Smuggler"
  specialization: "Mechanic"
  player: "human"
  npc_tier: "rival"
  obligation:
    amount: 0
    type: "None"
    details: "As a droid, Zee's 'Debt' is subsumed by Kaelen's background."
  motivation:
    type: "Safety"
    details: >
      Zee is driven by a deep-seated need for system stability. He calculates 
      risk constantly and seeks the resources needed to repair his glitching 
      vocal processor and power cell.
  background: >
    Zee began his existence as a high-end protocol model before a series of 
    unfortunate owners used him for increasingly dangerous technical work. 
    Rescued from a scrap heap by Kaelen Sunara, he has been rebuilt so many 
    times that his original programming is now a patchwork of high-level 
    slicing sub-routines and nervous survival instincts.

