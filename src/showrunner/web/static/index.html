<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Showrunner</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, serif;
      background: #1a1a2e;
      color: #e0d8c8;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .msg-narrative {
      line-height: 1.7;
      max-width: 72ch;
    }

    .msg-narrative p { margin-bottom: 0.5em; }
    .msg-narrative p:last-child { margin-bottom: 0; }

    .msg-status {
      font-size: 0.8rem;
      font-family: monospace;
      color: #7a8a9a;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0.25rem 0;
      border-top: 1px solid #2a3040;
    }

    .msg-dice {
      background: #0f2040;
      border-left: 3px solid #4a7fa5;
      padding: 0.6rem 0.9rem;
      font-family: monospace;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .msg-dice .dice-actor { color: #7ec8e3; font-weight: bold; }
    .msg-dice .dice-pool  { color: #a8d8a8; }
    .msg-dice .dice-notes { color: #b0a090; font-size: 0.85em; }

    .msg-error {
      background: #2a1010;
      border-left: 3px solid #a05050;
      padding: 0.5rem 0.9rem;
      font-size: 0.9rem;
      color: #e09090;
    }

    .msg-end {
      text-align: center;
      color: #7a8a9a;
      font-style: italic;
      padding: 1rem 0;
      border-top: 1px solid #2a3040;
    }

    #input-area {
      border-top: 1px solid #2a3040;
      padding: 0.75rem 1.5rem;
      display: flex;
      gap: 0.5rem;
      background: #16213e;
    }

    #input-area input[type="text"] {
      flex: 1;
      padding: 0.5rem 0.75rem;
      background: #0f172a;
      color: #e0d8c8;
      border: 1px solid #3a4a5a;
      border-radius: 4px;
      font-size: 1rem;
      font-family: inherit;
    }

    #input-area input[type="text"]:focus {
      outline: none;
      border-color: #4a7fa5;
    }

    #input-area input[type="text"]:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #input-area button {
      padding: 0.5rem 1rem;
      background: #2a4a6a;
      color: #e0d8c8;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
      white-space: nowrap;
    }

    #input-area button:hover:not(:disabled) { background: #3a5a7a; }
    #input-area button:disabled { opacity: 0.4; cursor: not-allowed; }

    #autoroll-btn {
      background: #1a3a2a;
    }
    #autoroll-btn:hover:not(:disabled) { background: #2a4a3a; }

    #prompt-label {
      font-size: 0.8rem;
      color: #7a8a9a;
      font-family: monospace;
      padding: 0.35rem 0;
      align-self: center;
      min-width: 9ch;
    }
  </style>
</head>
<body>

<div id="chat"></div>

<div id="input-area">
  <span id="prompt-label">waiting…</span>
  <input type="text" id="text-input" placeholder="" disabled>
  <button id="submit-btn" disabled>Send</button>
  <button id="autoroll-btn" style="display:none" disabled>Auto-roll</button>
</div>

<script>
  const chat       = document.getElementById('chat');
  const textInput  = document.getElementById('text-input');
  const submitBtn  = document.getElementById('submit-btn');
  const autorollBtn = document.getElementById('autoroll-btn');
  const promptLabel = document.getElementById('prompt-label');

  let pendingType = null;   // 'player_prompt' | 'dice_prompt' | 'parse_error' | null

  function scrollToBottom() {
    chat.scrollTop = chat.scrollHeight;
  }

  function appendEl(el) {
    chat.appendChild(el);
    scrollToBottom();
  }

  function setInputEnabled(type, placeholder) {
    pendingType = type;
    textInput.value = '';
    textInput.placeholder = placeholder;
    textInput.disabled = false;
    submitBtn.disabled = false;
    textInput.focus();
    if (type === 'dice_prompt') {
      autorollBtn.style.display = '';
      autorollBtn.disabled = false;
      promptLabel.textContent = 'dice >';
    } else {
      autorollBtn.style.display = 'none';
      promptLabel.textContent = type === 'player_prompt' ? 'action >' : 'fix >';
    }
  }

  function setInputDisabled() {
    pendingType = null;
    textInput.disabled = true;
    textInput.placeholder = '';
    submitBtn.disabled = true;
    autorollBtn.disabled = true;
    autorollBtn.style.display = 'none';
    promptLabel.textContent = 'waiting…';
  }

  async function sendInput(value) {
    setInputDisabled();
    try {
      await fetch('/play/input', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({value}),
      });
    } catch (err) {
      console.error('POST /play/input failed:', err);
    }
  }

  function handleEvent(event) {
    const { type } = event;

    if (type === 'narrative') {
      const div = document.createElement('div');
      div.className = 'msg-narrative';
      div.innerHTML = marked.parse(event.text || '');
      appendEl(div);

    } else if (type === 'status') {
      const div = document.createElement('div');
      div.className = 'msg-status';
      div.textContent = event.text || '';
      appendEl(div);

    } else if (type === 'dice_prompt') {
      const div = document.createElement('div');
      div.className = 'msg-dice';
      div.innerHTML = `<span class="dice-actor">${escHtml(event.actor)} — ${escHtml(event.skill)}</span><br>` +
        `<span class="dice-pool">Pool: ${escHtml(event.pool || '')}  Diff: ${escHtml(event.difficulty || '')}</span>` +
        (event.notes ? `<br><span class="dice-notes">${escHtml(event.notes)}</span>` : '');
      appendEl(div);
      setInputEnabled('dice_prompt', 'S2A1T1 or leave blank to auto-roll');

    } else if (type === 'player_prompt') {
      setInputEnabled('player_prompt', 'What do you and your companions do?');

    } else if (type === 'parse_error') {
      const div = document.createElement('div');
      div.className = 'msg-error';
      div.textContent = '⚠ ' + (event.context || 'Parse error — please correct:');
      appendEl(div);
      setInputEnabled('parse_error', 'Enter correction or leave blank to skip');

    } else if (type === 'session_end') {
      const div = document.createElement('div');
      div.className = 'msg-end';
      div.textContent = event.reason === 'player_quit'
        ? 'Session ended.'
        : `Scene complete. (${escHtml(event.reason || '')})`;
      appendEl(div);
      setInputDisabled();
      promptLabel.textContent = 'done';
    }
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function startSSE() {
    setInputDisabled();
    const es = new EventSource('/play');

    es.onmessage = (e) => {
      try {
        handleEvent(JSON.parse(e.data));
      } catch (err) {
        console.error('Bad SSE event:', e.data, err);
      }
    };

    es.onerror = () => {
      es.close();
      promptLabel.textContent = 'disconnected';
    };
  }

  submitBtn.addEventListener('click', () => {
    if (pendingType) sendInput(textInput.value.trim());
  });

  textInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && pendingType) sendInput(textInput.value.trim());
  });

  autorollBtn.addEventListener('click', () => {
    if (pendingType === 'dice_prompt') sendInput('');
  });

  startSSE();
</script>
</body>
</html>
